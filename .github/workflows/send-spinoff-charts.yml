name: Send Spin-off Charts

on:
  workflow_dispatch:
    inputs:
      skip_telegram:
        description: "Generate charts without sending them"
        required: false
        default: false
        type: boolean
      max_pairs:
        description: "Optional limit for testing"
        required: false
        default: ""
        type: string
  schedule:
    # 01:00 UTC = 09:00 Asia/Hong_Kong
    - cron: "0 1 * * *"

permissions:
  contents: read

concurrency:
  group: send-spinoff-charts
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate secrets
        run: |
          python - <<'PY'
          import os
          required = [
              "APCA_API_KEY_ID",
              "APCA_API_SECRET_KEY",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required GitHub Actions secrets: {', '.join(missing)}")
          PY

      - name: Send charts
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event.inputs.skip_telegram || 'false' }}" == "true" ]]; then
            args+=("--skip-telegram")
          fi
          if [[ -n "${{ github.event.inputs.max_pairs || '' }}" ]]; then
            args+=("--max-pairs" "${{ github.event.inputs.max_pairs }}")
          fi
          python -m src.send_all_to_telegram "${args[@]}"
